<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelLoop — Lên lịch trình & quản lý chi tiêu du lịch nhóm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/bpmn-js@17.11.1/dist/bpmn-viewer.development.js"></script>
<style>
  :root{
    /* palette lấy từ mockup */
    --bg:#f6fbfb;
    --ink:#1a3a45; --muted:#5d7880; --line:#dcecec;
    --mint:#5ec6c8; --mint2:#7ad6d3; --mint-soft:#e4f6f5; --mint-deep:#2b8592;
    --navy:#1a3a4a; --teal:#2b7a8c; --sun:#f4a63c; --sun-soft:#fdeecd;
    --card:#ffffff; --max:1140px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
  line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:600;line-height:1.12;letter-spacing:-.015em;margin:0}
  a{color:var(--mint-deep);text-decoration:none}
  code,.mono{font-family:'JetBrains Mono',monospace}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
  .eyebrow{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--mint-deep);font-weight:600}

  /* wordmark logo */
  .logo{display:inline-flex;align-items:center;gap:9px;font-family:'Fraunces',serif;font-weight:700;font-size:22px}
  .logo .mark{width:30px;height:20px;flex:none}
  .logo .t1{color:var(--navy)} .logo .t2{color:var(--mint)}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:200;transition:background .3s,box-shadow .3s;padding:0}
  nav.solid{background:rgba(246,251,251,.9);backdrop-filter:blur(14px);box-shadow:0 1px 0 var(--line)}
  nav .row{max-width:var(--max);margin:0 auto;padding:2px 24px;display:flex;align-items:center;justify-content:space-between}
  nav ul{display:flex;gap:24px;list-style:none;margin:0;padding:0;font-size:13.5px;font-weight:500}
  nav ul a{color:var(--muted)} nav ul a:hover{color:var(--mint-deep)}
  @media(max-width:900px){nav ul{display:none}}

  /* HERO */
  .hero{position:relative;width:100%;overflow:hidden;padding:88px 0 0;
  background:linear-gradient(160deg,#eafaf8 0%,#e4f2f1 55%,#eef7ee 100%);box-sizing:border-box}
  .hero-img-wrap{display:block;position:relative;max-width:100%;margin:0 auto}
  .hero-img{width:100%;height:auto;display:block}
  .hero-hit{position:absolute;cursor:pointer;z-index:10;display:block}
  .hero-hit.hit-1{left:5.5%;top:81.5%;width:16%;height:8%}
  .hero-hit.hit-2{left:24%;top:81.5%;width:15%;height:8%}

  .flight-divider{width:100%;max-width:1200px;margin:0 auto;padding:22px 24px 8px;background:var(--bg)}
  .flight-divider svg{width:100%;height:auto;display:block}
  .fd-path{stroke:var(--mint);stroke-width:2.5;stroke-dasharray:7 8}
  .fd-plane{fill:var(--mint-deep);opacity:.9}
  .fd-pin{fill:var(--sun);opacity:.85}

  .travel-strip{display:flex;justify-content:center;gap:44px;padding:44px 24px;flex-wrap:wrap;
  background:linear-gradient(180deg,#fff,#eaf6f5);border-top:1px solid var(--line)}
  .ts-ic{width:46px;height:46px;color:var(--mint-deep);opacity:.95;transition:opacity .2s,transform .2s}
  .ts-ic:hover{opacity:1;transform:translateY(-3px)}
  
  /* Bộ trang trí illustration */
  .corner-ic{position:absolute;color:var(--mint-deep);opacity:.15;pointer-events:none;z-index:0}
  .corner-ic.ci-right{width:180px;height:180px;right:-30px;top:-30px}
  .corner-ic.ci-left{width:160px;height:160px;left:-20px;bottom:-20px;color:var(--sun)}

  .up{opacity:0;transform:translateY(26px);animation:up .9s cubic-bezier(.2,.7,.2,1) forwards}
  .up.d1{animation-delay:.05s}.up.d2{animation-delay:.18s}.up.d3{animation-delay:.32s}.up.d4{animation-delay:.46s}
  @keyframes up{to{opacity:1;transform:none}}

  /* marquee */
  .strip{background:var(--navy);color:#bfe6e6;padding:15px 0;overflow:hidden;white-space:nowrap}
  .strip .track{display:inline-block;animation:slide 26s linear infinite;font-family:'Fraunces',serif;font-size:18px;font-style:italic}
  .strip .track span{margin:0 26px;opacity:.9}
  .strip .track b{color:var(--sun);font-style:normal;font-weight:600}
  @keyframes slide{to{transform:translateX(-50%)}}

  /* features */
  .features{padding:92px 0}
  .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:44px}
  @media(max-width:820px){.feat-grid{grid-template-columns:1fr}}
  .feat{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:30px;transition:transform .2s,box-shadow .2s}
  .feat:hover{transform:translateY(-5px);box-shadow:0 24px 50px -30px rgba(43,133,146,.5)}
  .feat .ic{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:18px;background:var(--mint-soft)}
  .feat h3{font-size:21px;margin-bottom:8px;color:var(--navy)}
  .feat p{color:var(--muted);font-size:14.5px;margin:0}

  section.block{padding:92px 0;border-top:1px solid var(--line)}
  section.block.alt{background:linear-gradient(180deg,#fff,#f0f9f8)}
  .sec-head{display:flex;align-items:baseline;gap:16px;margin-bottom:12px}
  .sec-head .num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--sun);font-weight:500}
  .sec-head h2{font-size:clamp(30px,4.4vw,46px);color:var(--navy)}
  .sec-desc{color:var(--muted);font-size:16px;max-width:640px;margin:0 0 42px 42px}
  @media(max-width:600px){.sec-desc{margin-left:0}}

  .two{display:grid;grid-template-columns:1fr 1fr;gap:46px;align-items:center}
  @media(max-width:820px){.two{grid-template-columns:1fr;gap:28px}}
  .ph{border:1.5px dashed #c4dede;border-radius:18px;background:#fff;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:46px 24px;min-height:270px;font-size:14px}
  .ph .ph-t{font-weight:600;color:var(--ink);margin-bottom:6px;font-family:'Fraunces',serif;font-size:18px}
  .ph .mono{font-size:11.5px;color:var(--mint-deep);margin-top:12px;word-break:break-all;background:var(--mint-soft);padding:5px 9px;border-radius:6px}
  img.shot{width:100%;border-radius:18px;border:1px solid var(--line);display:block}

  .people{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:stretch}
  @media(max-width:520px){.people{grid-template-columns:1fr}}
  .person{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
  .person .body{display:flex;flex-direction:column;flex:1}
  .person .quote{margin-top:auto}
  .person .avatar img{width:100%;height:230px;object-fit:cover;object-position:center 15%;display:block}
  .person:hover{transform:translateY(-5px);box-shadow:0 22px 46px -28px rgba(43,133,146,.5)}
  .person .avatar{width:100%;height:230px;overflow:hidden;background:linear-gradient(135deg,var(--mint-soft),var(--sun-soft));display:flex;align-items:center;justify-content:center;color:var(--mint-deep);font-weight:500;font-size:12px}
  .person .body{padding:16px}
  .person h3{font-size:17px;color:var(--navy)}
  .person .role{font-size:10.5px;color:var(--sun);font-weight:700;margin:4px 0 10px;letter-spacing:.04em;text-transform:uppercase}
  .person p{font-size:13px;color:var(--muted);margin:0}
  .quote{font-family:'Fraunces',serif;font-style:italic;color:var(--ink);font-size:13.5px;margin:12px 0 0;padding-left:12px;border-left:3px solid var(--sun)}

  .persona{display:grid;grid-template-columns:280px 1fr;gap:32px;align-items:start}
  @media(max-width:520px){.persona{grid-template-columns:1fr}}
  .facts{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:30px}
  .facts h3{font-size:25px;color:var(--navy)} .facts .tagline{color:var(--sun);font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;margin:6px 0 18px}
  .fact{display:grid;grid-template-columns:104px 1fr;gap:12px;padding:12px 0;border-top:1px solid var(--line);font-size:14.5px}
  .fact b{color:var(--mint-deep);font-weight:600}

  /* interview mở rộng */
  .person .body h3{font-size:19px}
  .person .body .age{font-size:12.5px;color:var(--muted);margin:2px 0 2px}
  .pblock{margin-top:12px}
  .pblock .lab{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mint-deep);margin-bottom:3px}
  .pblock p{font-size:13px;color:var(--muted);margin:0 0 4px}
  .pblock ul{margin:0;padding-left:16px} .pblock li{font-size:13px;color:var(--muted);margin-bottom:3px}
  /* persona goals grid */
  .pg{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px}
  @media(max-width:600px){.pg{grid-template-columns:1fr}}
  .pg .cell{background:#f4fbfa;border:1px solid var(--line);border-radius:14px;padding:18px}
  .pg .cell h4{font-size:14px;color:var(--navy);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .pg .cell ul{margin:0;padding-left:16px} .pg .cell li{font-size:13.5px;color:var(--muted);margin-bottom:5px}
  .pquote{grid-column:1/-1;background:linear-gradient(135deg,var(--mint-soft),var(--sun-soft));border:0;
  font-family:'Fraunces',serif;font-style:italic;font-size:17px;color:var(--navy);padding:22px 24px;border-radius:14px}

  .tablecard{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 14px 36px -32px rgba(43,133,146,.5)}
  table{width:100%;border-collapse:collapse;font-size:14.5px}
  th,td{text-align:left;padding:16px 20px;border-bottom:1px solid var(--line);vertical-align:top}
  th{background:var(--navy);color:#fff;font-weight:600;font-size:12px;letter-spacing:.05em;text-transform:uppercase}
  tr:last-child td{border-bottom:none}
  td.k{font-weight:600;width:34%;color:var(--navy)}
  tbody tr:nth-child(even){background:#f4fbfa}
  .fit td:first-child{color:var(--muted)}
  .fit td:last-child{font-weight:500}
  .fit td:last-child::before{content:"→ ";color:var(--sun);font-weight:700}

  .bpmn-box{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden;box-shadow:0 16px 40px -32px rgba(43,133,146,.55)}
  .bpmn-box .cap{padding:14px 20px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center;background:#f4fbfa}
  .bpmn-box .cap .mono{color:var(--mint-deep)}
  .bpmn-canvas{width:100%;height:560px;background:#fff}
  .bpmn-box+.bpmn-box{margin-top:30px}

  .embed{width:100%;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 16px 40px -32px rgba(43,133,146,.55)}
  .embed iframe{width:100%;height:680px;border:0;display:block}
  .hint{font-size:13px;color:var(--muted);margin-top:12px}
  .hint code{background:var(--sun-soft);padding:2px 7px;border-radius:5px;color:var(--navy)}

  .bg-decor{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  opacity:.32;z-index:0;pointer-events:none;filter:blur(6px) saturate(.6);
    transform:scale(1.05)}
  .bg-wash{position:absolute;inset:0;z-index:0;pointer-events:none;background:rgba(246,251,251,.32)}
  section.block.alt .bg-wash{background:rgba(240,249,248,.32)}
